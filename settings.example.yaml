unprocessed_music_dir: /Music/DJ Unprocessed
dj_library_dir: /Music/DJ Library
uncategorizable_dir: /Music/DJ Uncategorizable
duplicates_dir: /Music/DJ Duplicates
# Automated backups are written before destructive commands such as curation sync --write.
# Set to null to disable, but keeping this on is strongly recommended.
automated_backup_dir: /Music/DJ Automated Backup
database_path: ./db/library.sqlite3
genre_map_path: ./genres.yaml
binary_paths:
  ffmpeg: null
  ffprobe: null
  fpcalc: null
genre_discovery:
  max_examples_per_genre: 5
  include_missing_genre: true
  output_format: text
recursive: true
dry_run: true
limit: null
detect_potential_duplicates: true
duplicate_policy: exact_only
strict: false
bpm_format: integer
key_format: camelot
missing_genre_dir: Missing Genre
unmapped_genre_dir: Unmapped Genre
needs_review_dir: Needs Review
too_long_dir: Too Long
blacklisted_dir: Blacklisted
write_canonical_genre_to_metadata: true
preserve_original_genre_in_comment: true
original_genre_comment_prefix: "dj-sort original genre:"
omit_missing_filename_parts: true
filename_template: "{artist} - {title} - {bpm} - {key}.{ext}"
max_duration_minutes: 15
blacklist_substrings: []
remove_empty_genre_dirs: false
navidrome:
  host: dj.lan
  # Optional API URL and credentials for commands like rate-current and categorize-current.
  # You can also use NAVIDROME_URL, NAVIDROME_USER/NAVIDROME_USERNAME, and NAVIDROME_PASSWORD.
  url: http://dj.lan:4533
  username: null
  password: null
  # Optional direct SQLite DB path for bulk curation commands. You can also use NAVIDROME_DB.
  database_path: /srv/navidrome/navidrome.db
  # Optional SSH source for a read-only SQLite backup, useful when running locally.
  # You can also use NAVIDROME_DB_SSH. Format: user@host:/path/to/navidrome.db
  database_ssh: erik@192.168.1.31:/srv/navidrome/navidrome.db
  # Optional identity file for database_ssh. You can also use NAVIDROME_DB_SSH_IDENTITY_FILE.
  database_ssh_identity_file: ~/.ssh/erik
  # Path used inside the Navidrome container. This is normally the container's MusicFolder.
  library_root: /music
  # Host path where generated .m3u files should be written. With Navidrome, this folder
  # should also be visible under MusicFolder and ND_PLAYLISTSPATH should be relative to MusicFolder.
  playlist_root: /srv/dj-library/Library/_Playlists
  # Optional local output dir for dry-run/review on a workstation. Set to null to write to playlist_root.
  output_dir: ./reports/navidrome-playlists
  include_extm3u_header: true
  playlist_name_prefix: "Uncurated: "
genre_consolidation:
  mappings: {}
